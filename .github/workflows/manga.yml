name: Manga Fast Worker

on:
  workflow_dispatch:
    inputs:
      password: { required: true }
      file_id: { required: true }
      chat_id: { required: true }
      msg_id: { required: true }
      user_id: { required: true }
      lang: { required: true }
      prompt: { required: true }
      style: { required: true }
      fname: { required: true }

jobs:
  translation_job:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # <-- FIX: Isko badha diya taaki task delete na ho
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Security Check
        run: |
          if [ "${{ github.event.inputs.password }}" != "${{ secrets.RECONNECT1234555 }}" ]; then
            echo "Security Breach!"
            exit 1
          fi

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libglib2.0-0  # <-- FIX: OpenCV crash solve

      - name: Setup Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          git clone https://github.com/zyddnys/manga-image-translator.git
          cd manga-image-translator
          pip install -r requirements.txt
          pip install pyrogram tgcrypto Pillow

      - name: Run Fast Speed Worker
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          INPUTS: ${{ toJSON(github.event.inputs) }}
          PYTHONUNBUFFERED: "1"  # <-- FIX: Live logs instantly bhejne ke liye
        run: python worker.py
      
      - name: Cleanup
        if: always()
        run: rm -rf *
