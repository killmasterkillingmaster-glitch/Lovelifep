name: Manga Fast Worker

on:
  workflow_dispatch:
    inputs:
      password: { required: true }
      file_id: { required: true }
      chat_id: { required: true }
      msg_id: { required: true }
      user_id: { required: true }
      lang: { required: true }
      prompt: { required: true }
      style: { required: true }
      fname: { required: true }

jobs:
  translation_job:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Security Check
        run: |
          if [ "${{ github.event.inputs.password }}" != "${{ secrets.RECONNECT1234555 }}" ]; then
            echo "Security Breach!"
            exit 1
          fi

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libglib2.0-0 zip

      - name: Setup Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.10'

      - name: Install Fast Pyrogram
        run: pip install pyrogram tgcrypto Pillow

      - name: Instant Telegram Status (Booting)
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          INPUTS: ${{ toJSON(github.event.inputs) }}
        run: |
          python -c "
          import os, json, asyncio
          from pyrogram import Client
          inputs = json.loads(os.environ['INPUTS'])
          app = Client('init_sess', api_id=int(os.environ['API_ID']), api_hash=os.environ['API_HASH'], bot_token=os.environ['BOT_TOKEN'], in_memory=True)
          async def main():
              async with app:
                  try:
                      await app.edit_message_text(int(inputs['chat_id']), int(inputs['msg_id']), '⚙️ **Manga Worker Booted!**\n⏳ Downloading heavy AI Models & Dependencies (Takes 3-5 minutes). Please wait...')
                  except: pass
          app.run(main())
          "

      - name: Install Heavy AI Dependencies
        run: |
          git clone https://github.com/zyddnys/manga-image-translator.git
          cd manga-image-translator
          pip install -r requirements.txt

      - name: Run Fast Speed Worker
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          INPUTS: ${{ toJSON(github.event.inputs) }}
          PYTHONUNBUFFERED: "1"
        run: python worker.py
      
      - name: Cleanup
        if: always()
        run: rm -rf *
