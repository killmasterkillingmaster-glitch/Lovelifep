name: Manga Fast Worker

on:
  workflow_dispatch:
    inputs:
      password: { required: true }
      file_id: { required: true }
      chat_id: { required: true }
      msg_id: { required: true }
      user_id: { required: true }
      lang: { required: true }
      prompt: { required: true }
      style: { required: true }
      fname: { required: true }

jobs:
  translation_job:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # ✅ Max time
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Security Check
        run: |
          if [ "${{ github.event.inputs.password }}" != "${{ secrets.RECONNECT1234555 }}" ]; then
            echo "❌ Security Breach!"
            exit 1
          fi
          echo "✅ Connection Secured!"

      - name: Setup Python
        uses: actions/setup-python@v4
        with: 
          python-version: '3.10'

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android
          df -h

      - name: Install Dependencies
        run: |
          git clone https://github.com/zyddnys/manga-image-translator.git
          cd manga-image-translator
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir pyrogram tgcrypto Pillow

      - name: Run Worker with Logging
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          INPUTS: ${{ toJSON(github.event.inputs) }}
          PYTHONUNBUFFERED: 1
        run: |
          python worker.py 2>&1 | tee -a workflow.log
