name: Manga Fast Worker

on:
  workflow_dispatch:
    inputs:
      file_id: { required: true }
      chat_id: { required: true }
      msg_id: { required: true }
      user_id: { required: true }
      lang: { required: true }
      prompt: { required: true }
      style: { required: true }
      fname: { required: true }

jobs:
  translation_job:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0 zip

      - name: Setup Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.10'

      - name: Cache Pip Packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Clone manga-image-translator (Stable Version)
        run: |
          # Naya unstable version bypass karke purana stable version load karega
          git clone https://github.com/zyddnys/manga-image-translator.git
          cd manga-image-translator
          git checkout $(git rev-list -n 1 --before="2024-03-01" HEAD)

      - name: Install Dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r manga-image-translator/requirements.txt
          pip install pyrogram tgcrypto Pillow anyascii pymupdf

      - name: Run Fast Speed Worker
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          FILE_ID: ${{ github.event.inputs.file_id }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          MSG_ID: ${{ github.event.inputs.msg_id }}
          USER_ID: ${{ github.event.inputs.user_id }}
          LANG: ${{ github.event.inputs.lang }}
          PROMPT: ${{ github.event.inputs.prompt }}
          STYLE: ${{ github.event.inputs.style }}
          FNAME: ${{ github.event.inputs.fname }}
          PYTHONUNBUFFERED: "1"
        run: python worker.py
      
      - name: Cleanup Temporary Files
        if: always()
        run: |
          find . -maxdepth 1 -type f -not -name 'worker.py' -delete
          rm -rf manga_workspace
